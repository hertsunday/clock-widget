<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --font-pixel: "Press Start 2P", "Courier New", monospace;
    --card-w: 110px;
    --card-h: 68px;
    --font-size: 1.9rem;
    --digit-gap: 0.15em;
    --glyph-offset-x: 0.12em;
    --glyph-offset-y: 0.12em;

    /* light theme: white digits on pink squares */
    --bg: #FFFFFF;
    --card: #FFC2D1;
    --text: #2B0F1A;
    --date: #FF4B91;
  }

  @media (prefers-color-scheme: dark) {
    :root{
      /* dark theme: dark squares with pink digits */
      --bg: #191919;
      --card: #4A1535;
      --text: #FFE5EC;
      --date: #FF007F;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    font-family: var(--font-pixel);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 24px;
  }

  .clock {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .clock-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .group { display: flex; gap: 6px; }

  .colon {
    display: flex;
    align-items: center;
    justify-content: center;
    height: var(--card-h);
    color: var(--date);
    font-family: var(--font-pixel);
    font-size: 1.5rem;
    line-height: 1;
    user-select: none;
  }

  .colon span {
    display: block;
    transform: translate(var(--glyph-offset-x), var(--glyph-offset-y));
  }

  .flip {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    perspective: 400px;
    user-select: none;
  }

  .flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transform: rotateX(0deg);
    will-change: transform;
  }

  .flip.flipping .flip-inner {
    animation: flipCard 0.5s ease-in-out forwards;
  }

  @keyframes flipCard {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-180deg); }
  }

  .face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    background: var(--card);
    display: grid;
    place-items: center;
    color: var(--text);
    backface-visibility: hidden;
    transform: translateZ(0);
  }

  .face.back {
    transform: rotateX(-180deg) translateZ(0);
  }

  .face .val {
    font-family: var(--font-pixel);
    font-size: var(--font-size);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--digit-gap);
    width: 100%;
    height: 100%;
    transform: translate(var(--glyph-offset-x), var(--glyph-offset-y));
  }

  .ampm {
    position: absolute;
    left: 100%;
    bottom: 6px;
    margin-left: 8px;
    font-family: var(--font-pixel);
    font-size: 1rem;
    color: var(--date);
    line-height: 1;
    user-select: none;
    white-space: nowrap;
  }

  .date {
    font-family: var(--font-pixel);
    font-size: 0.9rem;
    letter-spacing: 0.03em;
    color: var(--date);
    user-select: none;
  }

  @media (max-width: 480px) {
    :root { --card-w: 44px; --card-h: 48px; --font-size: 1.35rem; }
    .colon { font-size: 1rem; }
    .ampm-badge { font-size: 0.42rem; left: 4px; bottom: 3px; }
    .date { font-size: 0.5rem; }
  }
</style>
</head>
<body>

<div class="clock-wrap">
  <div class="clock" id="clock">
    <div class="clock-row">
      <div class="group" id="hours"></div>
      <div class="colon"><span>:</span></div>
      <div class="group" id="minutes"></div>
    </div>
    <div class="ampm" id="ampm">PM</div>
  </div>
  <div class="date" id="date">—</div>
</div>

<script>
  const USE_24H = false; // set true to hide the AM/PM badge and use 24h hours

  function pad(n){ return n.toString().padStart(2, '0'); }

  function buildCell(container){
    const flip = document.createElement('div');
    flip.className = 'flip';

    const inner = document.createElement('div');
    inner.className = 'flip-inner';

    function makeFace(cls){
      const face = document.createElement('div');
      face.className = 'face ' + cls;
      const val = document.createElement('span');
      val.className = 'val';
      const d1 = document.createElement('span');
      const d2 = document.createElement('span');
      d1.textContent = '0';
      d2.textContent = '0';
      val.appendChild(d1);
      val.appendChild(d2);
      face.appendChild(val);
      return { face, d1, d2 };
    }

    const front = makeFace('front');
    const back = makeFace('back');

    inner.appendChild(front.face);
    inner.appendChild(back.face);
    flip.appendChild(inner);
    container.appendChild(flip);

    return { flip, inner, front, back, current: '00' };
  }

  const hourCell = buildCell(document.getElementById('hours'));
  const minuteCell = buildCell(document.getElementById('minutes'));

  function setDigit(cell, newVal){
    if (cell.current === newVal) return;

    cell.back.d1.textContent = newVal[0];
    cell.back.d2.textContent = newVal[1];

    cell.flip.classList.remove('flipping');
    void cell.flip.offsetWidth; // reflow, restarts the CSS animation
    cell.flip.classList.add('flipping');

    setTimeout(() => {
      cell.front.d1.textContent = newVal[0];
      cell.front.d2.textContent = newVal[1];
      cell.flip.classList.remove('flipping');
    }, 500);

    cell.current = newVal;
  }

  function updateClock(){
    const now = new Date();
    let h = now.getHours();
    const ampmLabel = h >= 12 ? 'PM' : 'AM';

    if (!USE_24H) {
      h = h % 12;
      if (h === 0) h = 12;
    }

    const hh = pad(h);
    const mm = pad(now.getMinutes());

    setDigit(hourCell, hh);
    setDigit(minuteCell, mm);

    const ampmEl = document.getElementById('ampm');
    ampmEl.style.display = USE_24H ? 'none' : 'block';
    ampmEl.textContent = ampmLabel;

    const dateOpts = { weekday: 'short', month: 'short', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', dateOpts);
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
